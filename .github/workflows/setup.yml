name: CI/CD Setup

on:
  push:
    branches:
      - main
      - schedx-prod
      - schedx-preprod
      - schedx-dev
  pull_request:
    branches:
      - main
      - schedx-prod
      - schedx-preprod
      - schedx-dev

jobs:
  install:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node-modules-${{ matrix.node-version }}
          path: node_modules

  build:
    needs: install
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-${{ matrix.node-version }}
          path: node_modules

      - name: Build project
        run: npm run build
