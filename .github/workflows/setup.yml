name: CI/CD Setup

on:
  push:
    branches:
      - main
      - schedx-prod
      - schedx-preprod
      - schedx-dev
  pull_request:
    branches:
      - main
      - schedx-prod
      - schedx-preprod
      - schedx-dev

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
